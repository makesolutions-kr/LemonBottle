<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Verification</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  text-align:center;
  padding:40px;
  margin:0;
}

.card{
  background:white;
  width:min(92vw,500px);
  margin:auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
  box-sizing:border-box;
}

h2{
  color:#2ea44f;
  margin-top:0;
}

iframe{
  width:100%;
  height:80vh;
  border:none;
  margin-top:20px;
  background:white;
}

@media (max-width: 600px){
  body{
    padding:16px;
  }

  .card{
    width:100%;
    padding:16px;
    border-radius:10px;
  }

  h2{
    font-size:28px;
  }

  p{
    font-size:16px;
  }

  iframe{
    height:75vh;
  }
}
</style>
</head>

<body>
  <div class="card">
    <h2>✔ Genuine Product</h2>
    <p>This product has been verified.</p>
    <iframe src="lemonbottle.pdf"></iframe>
  </div>
</body>
</html>
